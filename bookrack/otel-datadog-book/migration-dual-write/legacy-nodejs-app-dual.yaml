# Legacy Node.js App with Dual-Write
# Sends telemetry to BOTH Datadog (via dd-trace) AND OpenTelemetry

name: legacy-nodejs-app-dual
namespace: applications

chapter:
  name: migration-dual-write

# Workload configuration
workload:
  enabled: true
  type: deployment
  replicas: 3

image:
  repository: your-registry/legacy-nodejs-app
  tag: v3.2.1
  pullPolicy: IfNotPresent

# Service
service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000

# Environment variables - DUAL WRITE
env:
  # ========================================
  # LEGACY: Datadog APM (dd-trace)
  # ========================================
  - name: DD_AGENT_HOST
    valueFrom:
      fieldRef:
        fieldPath: status.hostIP
  - name: DD_TRACE_AGENT_PORT
    value: "8126"
  - name: DD_SERVICE
    value: "legacy-nodejs-app"
  - name: DD_ENV
    value: "production"
  - name: DD_VERSION
    value: "v3.2.1"
  - name: DD_TAGS
    value: "team:frontend,migration:dual-write"
  - name: DD_TRACE_ENABLED
    value: "true"
  - name: DD_PROFILING_ENABLED
    value: "true"
  - name: DD_LOGS_INJECTION
    value: "true"

  # ========================================
  # NEW: OpenTelemetry
  # ========================================
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector-agent.observability.svc.cluster.local:4317"
  - name: OTEL_SERVICE_NAME
    value: "legacy-nodejs-app"
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "deployment.environment=production,service.version=v3.2.1,migration=dual-write"
  - name: OTEL_METRICS_EXPORTER
    value: "otlp"
  - name: OTEL_TRACES_EXPORTER
    value: "otlp"

  # Node.js require both tracers
  # NOTE: Order matters - load dd-trace first, then OTel
  - name: NODE_OPTIONS
    value: >-
      --require dd-trace/init
      --require /otel-auto-instrumentation/autoinstrumentation.js

  # Application env vars
  - name: PORT
    value: "3000"
  - name: NODE_ENV
    value: "production"

# Resources (increased for dual instrumentation)
resources:
  limits:
    cpu: 1000m
    memory: 768Mi
  requests:
    cpu: 200m
    memory: 384Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60

# Health checks
livenessProbe:
  httpGet:
    path: /health
    port: 3000
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: 3000
  initialDelaySeconds: 30
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod annotations
podAnnotations:
  # OpenTelemetry auto-instrumentation
  instrumentation.opentelemetry.io/inject-nodejs: "nodejs-auto"

  migration.observability.io/strategy: "dual-write"
  migration.observability.io/datadog-enabled: "true"
  migration.observability.io/opentelemetry-enabled: "true"

# Service Account
serviceAccount:
  enabled: true
  name: legacy-nodejs-app-dual

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Labels
labels:
  app: legacy-nodejs-app
  migration-status: dual-write
  language: nodejs
