# Example Python API with Auto-Instrumentation
# Flask/FastAPI application automatically instrumented with OpenTelemetry

name: example-python-api
namespace: applications

chapter:
  name: applications

# Workload configuration
workload:
  enabled: true
  type: deployment
  replicas: 3

image:
  repository: your-registry/example-python-api
  tag: v1.0.0
  pullPolicy: IfNotPresent

# Service
service:
  enabled: true
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000

# Environment variables for OpenTelemetry
env:
  # OTLP endpoint
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://otel-collector-agent.observability.svc.cluster.local:4317"

  # Service name
  - name: OTEL_SERVICE_NAME
    value: "example-python-api"

  # Resource attributes
  - name: OTEL_RESOURCE_ATTRIBUTES
    value: "deployment.environment=production,service.version=v1.0.0,service.namespace=applications,team=backend,language=python"

  # Telemetry exporters
  - name: OTEL_METRICS_EXPORTER
    value: "otlp"
  - name: OTEL_TRACES_EXPORTER
    value: "otlp"
  - name: OTEL_LOGS_EXPORTER
    value: "otlp"

  # Protocol
  - name: OTEL_EXPORTER_OTLP_PROTOCOL
    value: "grpc"

  # Python-specific
  - name: OTEL_PYTHON_LOGGING_AUTO_INSTRUMENTATION_ENABLED
    value: "true"
  - name: OTEL_PYTHON_LOG_CORRELATION
    value: "true"

  # Sampling
  - name: OTEL_TRACES_SAMPLER
    value: "always_on"

  # Application env vars
  - name: PORT
    value: "8000"
  - name: ENVIRONMENT
    value: "production"

# Resources
resources:
  limits:
    cpu: 1000m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

# Autoscaling
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

# Health checks
livenessProbe:
  httpGet:
    path: /health/live
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: 8000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

# Pod annotations for auto-instrumentation
podAnnotations:
  # CRITICAL: This enables auto-instrumentation
  instrumentation.opentelemetry.io/inject-python: "python-auto"

# Service Account
serviceAccount:
  enabled: true
  name: example-python-api

# Security Context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

# Labels
labels:
  app: example-python-api
  language: python
  framework: fastapi
  tier: backend
